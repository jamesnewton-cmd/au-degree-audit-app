services:
  - type: web
    name: au-degree-audit
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: AUDIT_USER
        value: registrar
      - key: AUDIT_PASSWORD
        generateValue: true
    healthCheckPath: /health
