services:
  - type: web
    name: au-degree-audit
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: AUDIT_PASSWORD
        sync: false          # Set this manually in Render dashboard — never commit password
      - key: MAX_PULLS
        value: "1000"
    disk:
      name: audit-logs
      mountPath: /logs
      sizeGB: 1
